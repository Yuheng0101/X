name: Generate Cloud139 Assets

on:
  push:
    branches:
      - main
      - master
    paths:
      - "Tasks/cloud139/**"
      - ".github/workflows/generate-assets.yml"
  workflow_dispatch:

# 防止连续提交导致多个 Action 并发执行、在 push 时引发冲突
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-generate:
    runs-on: ubuntu-latest
    # 必须赋予写入代码仓库的权限，否则最后一步 git push 会报 403 错误
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Tasks/cloud139/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: Tasks/cloud139

      - name: Build assets
        run: npm run build
        working-directory: Tasks/cloud139
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Prepare commit message
        id: commit_meta
        env:
          # 使用环境变量传递 commit message，防止消息内的特殊字符(如双引号)破坏 bash 语法导致 Action 失败
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        shell: bash
        run: |
          SOURCE_SHA="${GITHUB_SHA::7}"
          SOURCE_MSG="$HEAD_COMMIT_MESSAGE"
          SOURCE_MSG="${SOURCE_MSG%%$'\n'*}"
          echo "message=chore(cloud139): sync dist/templates from ${SOURCE_SHA} ${SOURCE_MSG}" >> "$GITHUB_OUTPUT"
          echo "body=Auto-generated by GitHub Actions after source changes under Tasks/cloud139." >> "$GITHUB_OUTPUT"

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f Tasks/cloud139/README.md Tasks/cloud139/profiles Tasks/cloud139/dist
          git diff --cached --quiet || git commit -m "${{ steps.commit_meta.outputs.message }}" -m "${{ steps.commit_meta.outputs.body }}"
          git push
